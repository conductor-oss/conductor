# Conductor Master Controller — loki.local
# Port 8888 (memorable, non-default)
server.port=8888

# Postgres persistence
conductor.db.type=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/conductor_mc
spring.datasource.username=conductor
spring.datasource.password=conductor
spring.datasource.hikari.maximum-pool-size=10

# Scheduler — dogfooding conductor-scheduler-postgres-persistence
conductor.scheduler.enabled=true
conductor.scheduler.pollingInterval=1000
conductor.scheduler.pollBatchSize=10

# Indexing — in-memory for the MC (no ES/OS needed)
conductor.indexing.enabled=false

# Workflow execution lock — local only (single node)
conductor.workflow-execution-lock.type=local_only

# Actuator — expose health + info
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
