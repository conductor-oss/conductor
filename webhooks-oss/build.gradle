plugins {
    id 'java'
}

dependencies {
    implementation project(':conductor-common')
    implementation project(':conductor-core')

    implementation "com.jayway.jsonpath:json-path:${revJsonPath}"
    implementation "io.micrometer:micrometer-core:${revMicrometer}"
    implementation "commons-codec:commons-codec:${revCodec}"
    implementation "com.stripe:stripe-java:29.4.0"
    implementation "com.sendgrid:sendgrid-java:4.10.2"
    implementation "org.apache.commons:commons-lang3"

    compileOnly 'org.springframework.retry:spring-retry'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure'
    compileOnly 'org.springframework.boot:spring-boot-starter-web'

    testImplementation 'org.junit.vintage:junit-vintage-engine'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework:spring-web'
    testImplementation "org.testcontainers:testcontainers:${revTestContainer}"
    testImplementation "org.testcontainers:postgresql:${revTestContainer}"
    testImplementation 'org.springframework.retry:spring-retry'
    testImplementation 'com.zaxxer:HikariCP:5.1.0'
    testImplementation project(':conductor-postgres-persistence')
}

test {
    useJUnitPlatform()
}
