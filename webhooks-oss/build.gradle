plugins {
    id 'java'
}

dependencies {
    implementation project(':conductor-common')
    implementation project(':conductor-core')

    implementation "com.jayway.jsonpath:json-path:${revJsonPath}"
    implementation "io.micrometer:micrometer-core:${revMicrometer}"
    implementation "commons-codec:commons-codec:${revCodec}"
    // PINNED: webhook verifier-specific clients, not used elsewhere in the project; no shared rev*.
    implementation "com.stripe:stripe-java:${revStripe}"
    implementation "com.sendgrid:sendgrid-java:${revSendgrid}"
    implementation "org.apache.commons:commons-lang3"
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'

    compileOnly 'org.springframework.retry:spring-retry'

    testImplementation 'org.junit.vintage:junit-vintage-engine'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

test {
    useJUnitPlatform()
}
