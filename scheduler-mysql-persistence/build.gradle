dependencies {
    implementation project(':conductor-scheduler')
    implementation project(':conductor-common')

    compileOnly 'org.springframework.boot:spring-boot-starter'

    implementation "com.fasterxml.jackson.core:jackson-databind"
    implementation "com.fasterxml.jackson.core:jackson-core"

    implementation "org.apache.commons:commons-lang3"
    implementation "mysql:mysql-connector-java:8.0.33"
    implementation "org.springframework.boot:spring-boot-starter-jdbc"
    implementation "org.flywaydb:flyway-core:${revFlyway}"
    implementation "org.flywaydb:flyway-mysql:${revFlyway}"

    testImplementation 'org.springframework.boot:spring-boot-starter'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation "org.testcontainers:mysql:${revTestContainer}"
}

test {
    maxParallelForks = 1
    // Docker Desktop on macOS requires API v1.44+; docker-java defaults to v1.41
    environment 'DOCKER_API_VERSION', '1.44'
}
