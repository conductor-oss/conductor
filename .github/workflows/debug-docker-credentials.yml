name: Debug Docker Credentials

on:
  workflow_dispatch:

jobs:
  check-docker-user:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker Hub user for API key
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "Fetching JWT from Docker Hub..."
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKER_USERNAME}\", \"password\": \"${DOCKER_PASSWORD}\"}" \
            https://hub.docker.com/v2/users/login)

          JWT=$(echo "$RESPONSE" | jq -r '.token // empty')

          if [ -z "$JWT" ]; then
            echo "Login failed. Response:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "Login successful. JWT length: ${#JWT}"
          echo "Fetching user info..."
          USER_INFO=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -H "Authorization: Bearer $JWT" https://hub.docker.com/v2/user/)
          HTTP_STATUS=$(echo "$USER_INFO" | grep "HTTP_STATUS" | cut -d: -f2)
          USER_INFO=$(echo "$USER_INFO" | sed '/HTTP_STATUS/d')
          echo "HTTP status: $HTTP_STATUS"
          echo "Raw response: '$USER_INFO'"
          if [ -n "$USER_INFO" ]; then
            echo "$USER_INFO" | jq .
          else
            echo "Empty response body"
          fi
