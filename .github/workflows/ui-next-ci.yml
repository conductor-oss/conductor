name: UI v2 CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "ui-next/**"
  push:
    branches:
      - main
    paths:
      - "ui-next/**"

permissions:
  contents: read

jobs:
  lint-format-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-next

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.0

      # setup-node must come after pnpm/action-setup so it can locate the store.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm prettier:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e-mocked:
    name: E2E (Mocked)
    runs-on: ubuntu-latest
    needs: lint-format-test
    defaults:
      run:
        working-directory: ui-next

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('ui-next/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      # OS-level dependencies (apt packages) cannot be cached — always install.
      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run mocked E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ui-next/playwright-report/
          retention-days: 7
