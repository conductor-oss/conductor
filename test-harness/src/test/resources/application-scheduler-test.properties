#
# Scheduler integration test configuration
# Uses SQLite for persistence/queue/indexing — no Docker containers needed.
#
spring.datasource.url=jdbc:sqlite:${java.io.tmpdir}/conductor-scheduler-test-${random.uuid}.db?busy_timeout=15000&journal_mode=WAL
conductor.db.type=sqlite
conductor.queue.type=sqlite
conductor.indexing.type=sqlite
conductor.workflow-execution-lock.type=local_only
conductor.system-task-workers.enabled=true
conductor.app.ownerEmailMandatory=false
conductor.app.workflow.name-validation.enabled=false
conductor.scheduler.enabled=true
conductor.scheduler.pollingInterval=50
conductor.scheduler.pollBatchSize=10
conductor.scheduler.initialDelayMs=500
conductor.metrics-prometheus.enabled=false
conductor.metrics-logger.enabled=false
conductor.integrations.ai.enabled=false
spring.flyway.clean-disabled=false
conductor.app.sweeper.enabled=false